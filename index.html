<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Culturepedia — cultural hints for travelers and business professionals">
  <meta name="theme-color" content="#0f766e">
  <title>Culturepedia</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f0fdfa', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <header class="bg-brand-700 text-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-5">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-2xl font-bold tracking-tight">Culturepedia</h1>
          <p class="text-brand-50/80 text-sm mt-0.5">Cultural hints for business & travel</p>
        </div>
        <button id="install-btn" class="hidden text-sm bg-white/15 hover:bg-white/25 px-3 py-1.5 rounded-lg transition">
          Install App
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6 space-y-5">

    <!-- Filters -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">
      <input
        id="search"
        type="search"
        placeholder="Search hints…"
        class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
      >
      <div class="grid grid-cols-2 gap-3">
        <select id="filter-country" class="px-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">All countries</option>
        </select>
        <select id="filter-category" class="px-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-brand-500">
          <option value="">All categories</option>
        </select>
      </div>
      <p id="result-count" class="text-xs text-slate-500"></p>
    </section>

    <!-- Hints list -->
    <section id="hints-list" class="space-y-3">
      <p class="text-center text-slate-400 py-12">Loading hints…</p>
    </section>

    <!-- Submit form -->
    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
      <h2 class="font-semibold text-lg mb-3">Share a hint</h2>
      <form id="submit-form" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <input id="new-country" required placeholder="Country" class="px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          <input id="new-category" required placeholder="Category" class="px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <textarea id="new-text" required rows="3" placeholder="Your cultural hint…" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-brand-500"></textarea>
        <input id="new-expert-note" placeholder="Expert note (optional)" class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-lg transition text-sm">
          Submit hint
        </button>
      </form>
    </section>

  </main>

  <footer class="max-w-3xl mx-auto px-4 py-8 text-center text-xs text-slate-400">
    Culturepedia — your data, your code, no lock-in.
  </footer>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50"></div>

  <script src="app.js"></script>
</body>
</html>
